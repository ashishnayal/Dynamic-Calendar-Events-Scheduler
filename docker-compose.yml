services:
  mongodb:
    image: mongo:latest
    container_name: nettuscheduler_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: nettuscheduler_backend
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/nettuscheduler
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./nextjs-ui
      dockerfile: Dockerfile
    container_name: nettuscheduler_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
